[project]
name = "json-simd-mojo"
version = "0.1.0"
description = "SIMD-accelerated JSON parser for Mojo"
license = "Apache-2.0"
requires-python = ">=3.11"
dependencies = [
    "mojox>=0.2",
    "mojo-compiler==0.26.2.0",
]

[build-system]
requires = ["mojox-build>=0.2", "mojo-compiler==0.26.2.0"]
build-backend = "mojox_build"

[tool.mojox-build]
packages = ["simdjson"]
